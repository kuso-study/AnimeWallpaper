name: Update Wallhaven Wallpapers

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Wallhaven wallpapers
        run: |
          python3 << 'PY'
          import json
          import random
          import urllib.parse
          import urllib.request
          import time

          TARGET_COUNT = 100

          BASE_URL = "https://wallhaven.cc/api/v1/search"

          COMMON_PARAMS = {
              "categories": "010",
              "purity": "100",
              "atleast": "1920x1080",
              "ratios": "16x9,16x10",
              "per_page": "100"
          }

          def fetch(params):
              query = urllib.parse.urlencode(params)
              url = f"{BASE_URL}?{query}"
              print("Fetching:", url)

              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "AnimeWallpaper-GitHubActions/1.0"
                  }
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode("utf-8"))

          def normalize(item, source):
              tags = item.get("tags") or []
              tag_names = []

              for tag in tags:
                  name = tag.get("name")
                  if name:
                      tag_names.append(name.lower())

              return {
                  "id": item.get("id"),
                  "url": item.get("path"),
                  "resolution": item.get("resolution"),
                  "ratio": item.get("ratio"),
                  "views": item.get("views"),
                  "favorites": item.get("favorites"),
                  "colors": item.get("colors") or [],
                  "tags": tag_names,
                  "source": source
              }

          def add_unique(pool, items, source):
              seen = {x["id"] for x in pool}

              for item in items:
                  normalized = normalize(item, source)

                  if not normalized["id"] or not normalized["url"]:
                      continue

                  if normalized["id"] in seen:
                      continue

                  pool.append(normalized)
                  seen.add(normalized["id"])

                  if len(pool) >= TARGET_COUNT:
                      break

          wallpapers = []

          # 1. Main pool: monthly top
          top_params = {
              **COMMON_PARAMS,
              "sorting": "toplist",
              "topRange": "1M"
          }

          top_json = fetch(top_params)
          add_unique(wallpapers, top_json.get("data", []), "monthly_top")

          print("After monthly top:", len(wallpapers))

          # 2. Backup pool: random same-category wallpapers
          # Use several attempts/pages to fill to 100.
          attempts = 0

          while len(wallpapers) < TARGET_COUNT and attempts < 8:
              attempts += 1

              random_params = {
                  **COMMON_PARAMS,
                  "sorting": "random",
                  "page": str(attempts),
                  "seed": str(random.randint(100000, 999999))
              }

              random_json = fetch(random_params)
              add_unique(wallpapers, random_json.get("data", []), "random_fill")

              print(f"After random fill attempt {attempts}:", len(wallpapers))
              time.sleep(1)

          wallpapers = wallpapers[:TARGET_COUNT]

          with open("wallpapers.json", "w", encoding="utf-8") as f:
              json.dump(wallpapers, f, ensure_ascii=False, indent=2)

          print("Final wallpaper count:", len(wallpapers))
          PY

      - name: Commit updated wallpapers
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add wallpapers.json
          git commit -m "Update wallpapers" || echo "No changes"
          git push