<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallhaven Daily Top Wallpaper</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #wallpaper {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transition: opacity 1s ease;
      opacity: 0;
    }

    #info {
      position: fixed;
      left: 16px;
      bottom: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }
  </style>
</head>

<body>
  <img id="wallpaper" />
  <div id="info">Loading Wallhaven Daily Top...</div>

  <script>
    const API_URL = "./wallpapers.json";
    const REFRESH_INTERVAL = 5 * 60 * 1000;

    let wallpapers = [];
    let playlist = [];
    let index = 0;
    let history = [];

    const img = document.getElementById("wallpaper");
    const info = document.getElementById("info");

    async function fetchWallpapers() {
        try {
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();

        wallpapers = json.filter(item => item.url);

        playlist = buildBalancedPlaylist(wallpapers);
        index = 0;
        history = [];

        if (playlist.length > 0) {
            showNextWallpaper();
        } else {
            info.textContent = "No wallpapers found.";
        }
        } catch (err) {
        console.error(err);
        info.textContent = "Failed to load wallpapers.json.";
        }
    }

    function getStyleBucket(item) {
        const tags = (item.tags || []).join(" ");
        const colors = item.colors || [];

        if (tags.includes("landscape") || tags.includes("scenery") || tags.includes("sky")) {
        return "scenery";
        }

        if (tags.includes("city") || tags.includes("building") || tags.includes("street")) {
        return "city";
        }

        if (tags.includes("girl") || tags.includes("woman") || tags.includes("female")) {
        return "character";
        }

        if (tags.includes("mecha") || tags.includes("robot") || tags.includes("sci-fi")) {
        return "sci-fi";
        }

        if (colors.some(c => ["#000000", "#111111", "#222222"].includes(c.toLowerCase()))) {
        return "dark";
        }

        if (colors.some(c => ["#ffffff", "#eeeeee", "#dddddd"].includes(c.toLowerCase()))) {
        return "light";
        }

        return "mixed";
    }

    function buildBalancedPlaylist(items) {
        const buckets = {};

        for (const item of items) {
        const bucket = getStyleBucket(item);
        if (!buckets[bucket]) buckets[bucket] = [];
        buckets[bucket].push(item);
        }

        for (const key in buckets) {
        shuffle(buckets[key]);
        }

        const result = [];
        let lastBucket = null;

        while (result.length < items.length) {
        const availableBuckets = Object.keys(buckets)
            .filter(key => buckets[key].length > 0)
            .sort((a, b) => buckets[b].length - buckets[a].length);

        if (availableBuckets.length === 0) break;

        let chosenBucket =
            availableBuckets.find(key => key !== lastBucket) || availableBuckets[0];

        const chosenItem = buckets[chosenBucket].shift();

        result.push(chosenItem);
        lastBucket = chosenBucket;
        }

        return result;
    }

    function showNextWallpaper() {
        if (playlist.length === 0) return;

        let item = playlist[index];

        // 防止短期重复：最近 15 张不重复
        let attempts = 0;
        while (
        history.includes(item.id) &&
        attempts < playlist.length
        ) {
        index = (index + 1) % playlist.length;
        item = playlist[index];
        attempts++;
        }

        img.style.opacity = 0;

        setTimeout(() => {
        img.src = item.url;

        img.onload = () => {
            img.style.opacity = 1;

            const bucket = getStyleBucket(item);

            info.textContent =
            `Wallhaven #${item.id} · ${item.resolution} · ${bucket} · ${index + 1}/${playlist.length}`;
        };
        }, 500);

        history.push(item.id);
        if (history.length > 15) history.shift();

        index = (index + 1) % playlist.length;

        // 一轮结束后重新均衡洗牌
        if (index === 0) {
        playlist = buildBalancedPlaylist(wallpapers);
        history = [];
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
        }
    }

    fetchWallpapers();

    setInterval(showNextWallpaper, REFRESH_INTERVAL);

    // 每 6 小时重新读取一次 wallpapers.json
    setInterval(fetchWallpapers, 6 * 60 * 60 * 1000);
  </script>
</body>
</html>
